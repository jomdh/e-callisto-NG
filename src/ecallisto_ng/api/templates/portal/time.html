{% extends "portal/base.html" %}
{% block title %}Time -- e-Callisto NG{% endblock %}
{% block body %}
<div class="portal-main">
  <h2>Timing</h2>
  <p class="muted">Active time source, lock, and offset (DESIGN 12a). Recordings
    carry their time source + offset as provenance.</p>
  <div class="grid">
    <div class="card">
      <div class="muted">Source</div><h3 id="t-source">&mdash;</h3>
    </div>
    <div class="card">
      <div class="muted">Lock</div><h3 id="t-lock">&mdash;</h3>
    </div>
    <div class="card">
      <div class="muted">Offset</div><h3 id="t-offset">&mdash;</h3>
    </div>
    <div class="card">
      <div class="muted">Now (UTC)</div><h3 id="t-now" style="font-size:1rem">&mdash;</h3>
    </div>
  </div>
</div>
<script src="/static/js/time.js"></script>
{% endblock %}
