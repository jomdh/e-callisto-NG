{% extends "portal/base.html" %}
{% block title %}Live -- {{ instrument.name }}{% endblock %}
{% block body %}
<div class="topbar">
  <span class="brand">e-Callisto NG</span>
  <span><a href="/portal">&larr; dashboard</a></span>
</div>
<div class="portal-main">
  <h2>Live &mdash; {{ instrument.name }}</h2>
  <p class="muted">
    <span id="live-status">connecting&hellip;</span>
    &middot; {{ instrument.channels }} channels
    &middot; <label><input type="checkbox" id="live-db"> dB</label>
  </p>
  <div class="card" style="padding:0;overflow:hidden">
    <canvas id="waterfall" width="800" height="320"
            data-instrument="{{ instrument.id }}"
            style="display:block;width:100%;background:#000"></canvas>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem">
    <div class="card" style="flex:1;min-width:280px">
      <h3 style="margin-top:0">Spectrum y(f)</h3>
      <canvas id="spectrum" width="400" height="180"
              style="display:block;width:100%"></canvas>
    </div>
    <div class="card" style="flex:1;min-width:280px">
      <h3 style="margin-top:0">Light curve y(t) &mdash; peak channel</h3>
      <canvas id="lightcurve" width="400" height="180"
              style="display:block;width:100%"></canvas>
    </div>
  </div>
</div>
<script src="/static/js/waterfall.js"></script>
{% endblock %}
