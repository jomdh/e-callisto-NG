<!DOCTYPE html>
<html lang="en" data-theme="nebula">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}e-Callisto NG{% endblock %}</title>
  <meta name="theme-color" content="#0d0e1a">
  <script nonce="{{ request.state.csp_nonce }}">
    (function () {
      var allowed = ['nebula', 'supernova'];
      var t = localStorage.getItem('ecallisto-theme');
      if (!t || allowed.indexOf(t) === -1) { t = 'nebula'; }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round">
  <link rel="stylesheet" href="/static/css/material-design-system.css">
  <link rel="stylesheet" href="/static/css/portal.css">
</head>
<body>
  {% if user %}
  <div class="mobile-fab" id="mobile-fab" role="button" tabindex="0"
       aria-label="Open navigation">
    <span class="material-icons">menu</span>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  {% include "portal/_sidebar.html" %}
  {% endif %}

  <div class="app-main">
    {% block body %}{% endblock %}
  </div>

  <script src="/static/js/portal.js"></script>
  {% if user %}<script src="/static/js/sidebar.js"></script>{% endif %}
</body>
</html>
